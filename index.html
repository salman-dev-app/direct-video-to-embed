<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indigo Pro Anime Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --bg: #000;
            --ui-bg: rgba(15, 23, 42, 0.85);
            --glass: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body, html { width: 100%; height: 100%; background: #000; overflow: hidden; }

        #video-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            background: #000;
            overflow: hidden;
            justify-content: center;
            align-items: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Keeps anime aspect ratio perfect */
        }

        /* --- UI OVERLAYS --- */
        .ui-layer {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 15px;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 10;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, transparent 20%, transparent 80%, rgba(0,0,0,0.8) 100%);
        }

        #video-container:hover .ui-layer { opacity: 1; }

        /* --- TOP CONTROLS (Hide in Fullscreen) --- */
        .top-bar {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            transition: 0.3s;
        }

        /* --- BOTTOM CONTROLS --- */
        .bottom-bar { width: 100%; }

        .progress-area {
            width: 100%;
            height: 5px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 12px;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--primary);
            border-radius: 10px;
            box-shadow: 0 0 12px var(--primary);
        }

        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
        }

        .btn-group { display: flex; align-items: center; gap: 18px; }

        .icon-btn {
            background: none; border: none; color: white;
            font-size: 1.2rem; cursor: pointer; transition: 0.2s;
        }
        .icon-btn:hover { color: var(--primary); transform: scale(1.1); }

        .time { font-size: 0.85rem; min-width: 90px; }

        /* --- FULLSCREEN LAYOUT CHANGES --- */
        /* When in fullscreen, move top buttons to the bottom group */
        #video-container.fullscreen-mode .top-bar {
            transform: translateY(-50px);
            opacity: 0;
            pointer-events: none;
        }

        .fs-only-btns { display: none; }
        #video-container.fullscreen-mode .fs-only-btns { display: flex; gap: 18px; }

        /* --- SUBTITLES & DUB SETTINGS --- */
        .settings-panel {
            position: absolute;
            bottom: 80px;
            right: 20px;
            background: var(--ui-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--primary);
            border-radius: 12px;
            width: 220px;
            display: none;
            flex-direction: column;
            overflow: hidden;
            z-index: 20;
        }
        .settings-panel.active { display: flex; animation: slideUp 0.3s; }

        .setting-opt {
            padding: 12px 15px;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            color: white;
        }
        .setting-opt:hover { background: var(--primary); }

        /* --- ANIME SKIP BUTTON --- */
        .skip-intro {
            position: absolute;
            bottom: 100px;
            right: 20px;
            background: var(--primary);
            color: white;
            padding: 10px 18px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            display: none;
            border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* If no link is provided, show this */
        #link-prompt {
            position: fixed; inset: 0; background: #0f172a; 
            z-index: 100; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <!-- URL PROMPT (Hidden if ?v= exists) -->
    <div id="link-prompt">
        <div style="text-align:center; background:#1e293b; padding:40px; border-radius:20px; border:1px solid var(--primary);">
            <h2 style="color:white; margin-bottom:20px;">Indigo Anime Player</h2>
            <input type="text" id="vUrl" placeholder="Paste Direct .mp4 Link" style="width:300px; padding:10px; border-radius:5px; border:none; margin-bottom:20px;">
            <br>
            <button onclick="manualLoad()" style="background:var(--primary); color:white; border:none; padding:10px 30px; border-radius:5px; cursor:pointer;">Launch Player</button>
        </div>
    </div>

    <!-- MAIN PLAYER -->
    <div id="video-container" style="display: none;">
        <video id="mainVideo" playsinline>
            <source src="" type="video/mp4">
            <track id="mainSubs" kind="subtitles" srclang="en" label="English" default>
        </video>

        <button class="skip-intro" id="skipBtn" onclick="seek(90)">Skip Intro +1:30</button>

        <div class="ui-layer">
            <!-- TOP BAR (Only visible in normal mode) -->
            <div class="top-bar" id="topBar">
                <button class="icon-btn" onclick="toggleSettings()"><i class="fas fa-cog"></i></button>
                <button class="icon-btn" onclick="togglePip()"><i class="fas fa-clone"></i></button>
                <button class="icon-btn" id="fsBtn1" onclick="toggleFS()"><i class="fas fa-expand"></i></button>
            </div>

            <div class="center-play"></div>

            <!-- BOTTOM BAR -->
            <div class="bottom-bar">
                <div class="progress-area" id="pArea">
                    <div class="progress-bar" id="pBar"></div>
                </div>

                <div class="controls-row">
                    <div class="btn-group">
                        <button class="icon-btn" id="playBtn"><i class="fas fa-play"></i></button>
                        <button class="icon-btn" onclick="seek(-10)"><i class="fas fa-undo"></i></button>
                        <button class="icon-btn" onclick="seek(10)"><i class="fas fa-redo"></i></button>
                        <div class="time"><span id="cur">00:00</span> / <span id="dur">00:00</span></div>
                    </div>

                    <div class="btn-group">
                        <!-- These appear here ONLY in fullscreen -->
                        <div class="fs-only-btns">
                            <button class="icon-btn" onclick="toggleSettings()"><i class="fas fa-cog"></i></button>
                            <button class="icon-btn" onclick="togglePip()"><i class="fas fa-clone"></i></button>
                        </div>
                        <button class="icon-btn" id="fsBtn2" onclick="toggleFS()"><i class="fas fa-expand"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- SETTINGS MENU -->
        <div class="settings-panel" id="setMenu">
            <div class="setting-opt" onclick="toggleSubs()"><b>Subtitles</b> <span id="subLabel">Auto-ON</span></div>
            <div class="setting-opt" onclick="toggleDub()"><b>Voice/Dub</b> <span id="dubLabel">Japanese</span></div>
            <div class="setting-opt" onclick="changeSpeed()"><b>Speed</b> <span id="speedLabel">1.0x</span></div>
            <div class="setting-opt" onclick="takeSS()"><b>Snapshot</b> <i class="fas fa-camera"></i></div>
        </div>
    </div>

    <script>
        const video = document.getElementById('mainVideo');
        const container = document.getElementById('video-container');
        const prompt = document.getElementById('link-prompt');
        const playBtn = document.getElementById('playBtn');

        // Initial Load
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const v = urlParams.get('v');
            if(v) start(v);
        };

        function manualLoad() {
            const val = document.getElementById('vUrl').value;
            if(val) start(val);
        }

        function start(link) {
            prompt.style.display = 'none';
            container.style.display = 'flex';
            video.src = link;
            video.play().catch(() => {});
            playBtn.innerHTML = '<i class="fas fa-pause"></i>';
        }

        // Logic for Play/Pause
        playBtn.onclick = () => {
            if(video.paused) { video.play(); playBtn.innerHTML = '<i class="fas fa-pause"></i>'; }
            else { video.pause(); playBtn.innerHTML = '<i class="fas fa-play"></i>'; }
        };

        // Progress Bar & Time
        video.ontimeupdate = () => {
            const p = (video.currentTime / video.duration) * 100;
            document.getElementById('pBar').style.width = p + '%';
            document.getElementById('cur').innerText = format(video.currentTime);
            document.getElementById('dur').innerText = format(video.duration);
            
            // Skip Intro Logic
            document.getElementById('skipBtn').style.display = (video.currentTime > 5 && video.currentTime < 95) ? 'block' : 'none';
        };

        function format(t) {
            let m = Math.floor(t / 60); let s = Math.floor(t % 60);
            return (m<10?'0'+m:m) + ":" + (s<10?'0'+s:s);
        }

        document.getElementById('pArea').onclick = (e) => {
            video.currentTime = (e.offsetX / document.getElementById('pArea').offsetWidth) * video.duration;
        };

        function seek(s) { video.currentTime += s; }

        // Layout Switcher (Fullscreen Logic)
        function toggleFS() {
            if (!document.fullscreenElement) {
                container.requestFullscreen();
                container.classList.add('fullscreen-mode');
            } else {
                document.exitFullscreen();
                container.classList.remove('fullscreen-mode');
            }
        }

        // Detect if user exits FS via 'Esc' key
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) container.classList.remove('fullscreen-mode');
        });

        // Other Features
        function toggleSettings() { document.getElementById('setMenu').classList.toggle('active'); }

        function toggleSubs() {
            const t = video.textTracks[0];
            t.mode = (t.mode === 'showing') ? 'disabled' : 'showing';
            document.getElementById('subLabel').innerText = (t.mode === 'showing' ? 'ON' : 'OFF');
        }

        function toggleDub() {
            const current = document.getElementById('dubLabel').innerText;
            document.getElementById('dubLabel').innerText = (current === 'Japanese' ? 'English' : 'Japanese');
            // logic to switch audio tracks would go here for HLS
        }

        function changeSpeed() {
            video.playbackRate = (video.playbackRate >= 2) ? 1 : video.playbackRate + 0.5;
            document.getElementById('speedLabel').innerText = video.playbackRate + 'x';
        }

        function togglePip() { video.requestPictureInPicture(); }

        function takeSS() {
            const c = document.createElement('canvas');
            c.width = video.videoWidth; c.height = video.videoHeight;
            c.getContext('2d').drawImage(video, 0, 0);
            const a = document.createElement('a'); a.download = 'capture.png'; a.href = c.toDataURL(); a.click();
        }

        // Close settings on video click
        video.onclick = () => document.getElementById('setMenu').classList.remove('active');
    </script>
</body>
</html>
