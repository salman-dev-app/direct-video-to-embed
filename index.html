<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indigo Pro V4 | Anime Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --indigo: #6366f1;
            --indigo-glow: rgba(99, 102, 241, 0.4);
            --bg: #0b0e14;
            --surface: #161b22;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; background: var(--bg); color: #fff; overflow: hidden; }

        /* --- GENERATOR SCREEN --- */
        #gen-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; padding: 20px; text-align: center; background: radial-gradient(circle at center, #1e1b4b 0%, #0b0e14 100%);
        }
        .card {
            background: var(--surface); padding: 40px; border-radius: 24px;
            border: 1px solid var(--indigo); width: 100%; max-width: 550px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        input {
            width: 100%; padding: 15px; background: #000; border: 1px solid #333;
            color: white; border-radius: 12px; margin: 20px 0; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--indigo); box-shadow: 0 0 10px var(--indigo-glow); }
        .btn {
            background: var(--indigo); color: white; border: none; padding: 15px 30px;
            border-radius: 10px; font-weight: 600; cursor: pointer; width: 100%; transition: 0.3s;
        }
        .btn:hover { background: #4f46e5; transform: translateY(-2px); }
        .output-box { margin-top: 20px; display: none; text-align: left; background: #000; padding: 15px; border-radius: 10px; border: 1px dashed var(--indigo); }

        /* --- PLAYER SCREEN --- */
        #player-box {
            display: none; width: 100vw; height: 100vh; background: #000; position: relative;
        }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* Controls UI Overlay */
        .overlay {
            position: absolute; inset: 0; z-index: 10;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 40%);
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 20px; transition: opacity 0.4s ease;
        }
        .hide-ui { opacity: 0; cursor: none; }

        /* Progress Bar */
        .p-bar-base { width: 100%; height: 6px; background: rgba(255,255,255,0.15); border-radius: 10px; cursor: pointer; margin-bottom: 15px; position: relative; }
        .p-bar-fill { height: 100%; width: 0%; background: var(--indigo); border-radius: 10px; box-shadow: 0 0 15px var(--indigo); transition: width 0.1s linear; }

        /* Buttons Row */
        .controls-row { display: flex; align-items: center; justify-content: space-between; }
        .btn-grp { display: flex; align-items: center; gap: 20px; }
        .icon { background: none; border: none; color: white; font-size: 1.4rem; cursor: pointer; transition: 0.2s; text-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .icon:hover { color: var(--indigo); transform: scale(1.1); }
        .time { font-size: 0.85rem; font-weight: 500; min-width: 100px; opacity: 0.9; }

        /* Gesture Feedback (Ripples) */
        .ripple {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 100px; height: 100px; background: var(--indigo-glow);
            border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 1.2rem; opacity: 0; pointer-events: none; transition: 0.4s; z-index: 5;
        }
        .ripple i { margin-bottom: 5px; }
        .ripple span { font-size: 0.7rem; font-weight: bold; }
        .ripple-left { left: 10%; }
        .ripple-right { right: 10%; }
        .ripple.active { opacity: 1; transform: translateY(-50%) scale(1.3); }

        /* Settings Menu */
        .menu {
            position: absolute; bottom: 85px; right: 20px; background: rgba(22, 27, 34, 0.95);
            backdrop-filter: blur(15px); border: 1px solid var(--indigo); border-radius: 15px; width: 240px;
            display: none; flex-direction: column; overflow: hidden; z-index: 20; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .menu.active { display: flex; animation: slideUp 0.3s forwards; }
        .m-header { padding: 12px; font-size: 0.7rem; font-weight: 800; background: var(--indigo); color: #fff; letter-spacing: 1px; }
        .m-item { padding: 12px 18px; font-size: 0.9rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .m-item:hover { background: var(--indigo); }

        /* Speed Indicator */
        #speed-hint {
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(99, 102, 241, 0.8); padding: 6px 18px; border-radius: 30px;
            font-size: 0.8rem; font-weight: bold; display: none; z-index: 100; box-shadow: 0 0 20px var(--indigo-glow);
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <!-- SECTION 1: EMBED GENERATOR -->
    <div id="gen-screen">
        <div class="card">
            <h1 style="color:var(--indigo)">Indigo Link Creator</h1>
            <p style="opacity:0.6; font-size:0.9rem; margin-top:5px;">Professional Anime Player Engine</p>
            
            <input type="text" id="userInput" placeholder="Paste direct video link (.mp4, .m3u8, etc.)">
            
            <button class="btn" onclick="buildLink()">Generate Player & Embed</button>
            
            <div class="output-box" id="output">
                <span style="font-size:0.7rem; color:var(--indigo); font-weight:bold;">IFRAME EMBED CODE:</span>
                <div id="resCode" style="font-family:monospace; font-size:0.75rem; word-break:break-all; margin:10px 0; color:#ccc;"></div>
                <button class="btn" style="padding:8px; font-size:0.8rem;" onclick="copyRes()">Copy Embed Code</button>
            </div>
        </div>
    </div>

    <!-- SECTION 2: THE PLAYER -->
    <div id="player-box">
        <video id="vid" crossorigin="anonymous" playsinline>
            <source src="" type="video/mp4">
        </video>

        <!-- Dynamic Feedback UI -->
        <div class="ripple ripple-left" id="ripL"><i class="fas fa-backward"></i><span>10s</span></div>
        <div class="ripple ripple-right" id="ripR"><i class="fas fa-forward"></i><span>10s</span></div>
        <div id="speed-hint">2x SPEED ACTIVE</div>

        <!-- Player Controls Overlay -->
        <div class="overlay" id="ui">
            <div class="p-bar-base" id="pBase">
                <div class="p-bar-fill" id="pFill"></div>
            </div>

            <div class="controls-row">
                <div class="btn-grp">
                    <button class="icon" id="playBtn"><i class="fas fa-play"></i></button>
                    <button class="icon" onclick="skip(-10, 'L')" title="Rewind 10s"><i class="fas fa-undo"></i></button>
                    <button class="icon" onclick="skip(10, 'R')" title="Forward 10s"><i class="fas fa-redo"></i></button>
                    <span class="time" id="timeDisplay">00:00 / 00:00</span>
                </div>

                <div class="btn-grp">
                    <button class="icon" onclick="toggleMenu()" title="Audio & Settings"><i class="fas fa-sliders-h"></i></button>
                    <button class="icon" onclick="handleFS()" title="Fullscreen"><i class="fas fa-expand"></i></button>
                </div>
            </div>
        </div>

        <!-- Settings Context Menu -->
        <div class="menu" id="menu">
            <div class="m-header">PLAYER CONFIGURATION</div>
            <div id="audioTracksContainer">
                <div class="m-item">Default Audio Track <i class="fas fa-check" style="font-size:0.7rem"></i></div>
            </div>
            <div class="m-item" onclick="changeSpeed()">Playback Speed <span id="speedVal" style="color:var(--indigo); font-weight:bold;">1.0x</span></div>
            <div class="m-item" onclick="takePhoto()">Save Frame (SS) <i class="fas fa-camera"></i></div>
        </div>
    </div>

    <script>
        const vid = document.getElementById('vid');
        const ui = document.getElementById('ui');
        const pFill = document.getElementById('pFill');
        const pBase = document.getElementById('pBase');
        const playBtn = document.getElementById('playBtn');

        // 1. LINK GENERATOR ENGINE
        function buildLink() {
            const url = document.getElementById('userInput').value;
            if(!url) return alert("Please enter a valid link!");
            const finalURL = window.location.href.split('?')[0] + "?v=" + encodeURIComponent(url);
            document.getElementById('resCode').innerText = `<iframe src="${finalURL}" width="100%" height="500px" frameborder="0" allowfullscreen></iframe>`;
            document.getElementById('output').style.display = 'block';
        }

        function copyRes() {
            navigator.clipboard.writeText(document.getElementById('resCode').innerText);
            alert("Embed code copied to clipboard!");
        }

        // 2. PLAYER INITIALIZATION
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const vUrl = params.get('v');
            if(vUrl) {
                document.getElementById('gen-screen').style.display = 'none';
                document.getElementById('player-box').style.display = 'block';
                vid.src = vUrl;
                vid.load();
                setupAudioSystem();
            }
        };

        // 3. GESTURES: DOUBLE-TAP & LONG-PRESS (Youtube Style)
        let lastTapTime = 0;
        let pressTimer;

        vid.addEventListener('touchstart', (e) => {
            const now = Date.now();
            const tapGap = now - lastTapTime;
            const xCoord = e.touches[0].clientX;
            const screenWidth = window.innerWidth;

            if (tapGap < 300) {
                // Double Tap Action
                if (xCoord < screenWidth / 2) skip(-10, 'L');
                else skip(10, 'R');
                e.preventDefault();
            }
            lastTapTime = now;

            // Long Press for 2x Speed
            pressTimer = setTimeout(() => {
                vid.playbackRate = 2.0;
                document.getElementById('speed-hint').style.display = 'block';
            }, 500);
        });

        vid.addEventListener('touchend', () => {
            clearTimeout(pressTimer);
            vid.playbackRate = 1.0;
            document.getElementById('speed-hint').style.display = 'none';
        });

        // Mouse double-click support
        vid.addEventListener('dblclick', (e) => {
            if (e.clientX < window.innerWidth / 2) skip(-10, 'L');
            else skip(10, 'R');
        });

        function skip(seconds, side) {
            vid.currentTime += seconds;
            const rip = document.getElementById(side === 'L' ? 'ripL' : 'ripR');
            rip.classList.add('active');
            setTimeout(() => rip.classList.remove('active'), 500);
        }

        // 4. PLAYER CORE CONTROLS
        playBtn.onclick = togglePlay;
        vid.onclick = () => {
            document.getElementById('menu').classList.remove('active');
            togglePlay();
        };

        function togglePlay() {
            if(vid.paused) { vid.play(); playBtn.innerHTML='<i class="fas fa-pause"></i>'; }
            else { vid.pause(); playBtn.innerHTML='<i class="fas fa-play"></i>'; }
        }

        vid.ontimeupdate = () => {
            const pct = (vid.currentTime / vid.duration) * 100;
            pFill.style.width = pct + '%';
            document.getElementById('timeDisplay').innerText = fmt(vid.currentTime) + " / " + fmt(vid.duration);
        };

        function fmt(s) {
            if(isNaN(s)) return "00:00";
            let m=Math.floor(s/60), sec=Math.floor(s%60);
            return (m<10?'0'+m:m)+":"+(sec<10?'0'+sec:sec);
        }

        pBase.onclick = (e) => vid.currentTime = (e.offsetX / pBase.offsetWidth) * vid.duration;

        // 5. FULLSCREEN & AUTO-ROTATE
        async function handleFS() {
            const box = document.getElementById('player-box');
            if (!document.fullscreenElement) {
                await box.requestFullscreen();
                if (screen.orientation && screen.orientation.lock) {
                    screen.orientation.lock('landscape').catch(() => {});
                }
            } else {
                document.exitFullscreen();
            }
        }

        // 6. AUDIO TRACKS & SETTINGS
        function setupAudioSystem() {
            const container = document.getElementById('audioTracksContainer');
            if(vid.audioTracks && vid.audioTracks.length > 1) {
                container.innerHTML = "";
                for(let i=0; i<vid.audioTracks.length; i++) {
                    const item = document.createElement('div');
                    item.className = "m-item";
                    item.innerText = `Audio Track ${i+1} (${vid.audioTracks[i].language})`;
                    item.onclick = () => {
                        for(let j=0; j<vid.audioTracks.length; j++) vid.audioTracks[j].enabled = (i===j);
                        alert("Audio track switched.");
                    };
                    container.appendChild(item);
                }
            }
        }

        function toggleMenu() { document.getElementById('menu').classList.toggle('active'); }

        function changeSpeed() {
            vid.playbackRate = vid.playbackRate >= 2 ? 0.5 : vid.playbackRate + 0.5;
            document.getElementById('speedVal').innerText = vid.playbackRate + 'x';
        }

        // 7. AUTO-HIDE UI
        let uiTimer;
        function showUI() {
            ui.classList.remove('hide-ui');
            clearTimeout(uiTimer);
            if(!vid.paused) {
                uiTimer = setTimeout(() => ui.classList.add('hide-ui'), 3000);
            }
        }
        document.getElementById('player-box').onmousemove = showUI;
        document.getElementById('player-box').ontouchstart = showUI;

        function takePhoto() {
            const canvas = document.createElement('canvas');
            canvas.width = vid.videoWidth; canvas.height = vid.videoHeight;
            canvas.getContext('2d').drawImage(vid, 0, 0);
            const link = document.createElement('a');
            link.download = 'anime_snapshot.png';
            link.href = canvas.toDataURL();
            link.click();
        }
    </script>
</body>
</html>
