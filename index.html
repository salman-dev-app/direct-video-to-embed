<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indigo Pro V6 | Anime Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg-dark: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; background: #000; color: var(--text); overflow: hidden; }

        /* --- GENERATOR (Only for you) --- */
        #gen-ui { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: var(--bg-dark); padding: 20px; }
        .gen-card { background: var(--surface); padding: 30px; border-radius: 20px; border: 1px solid var(--primary); width: 100%; max-width: 500px; text-align: center; box-shadow: 0 0 40px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 15px 0; background: #000; border: 1px solid #334155; color: #fff; border-radius: 8px; outline: none; }
        .btn-gen { background: var(--primary); color: #fff; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; transition: 0.3s; }
        .btn-gen:hover { background: var(--primary-dark); }

        /* --- PLAYER --- */
        #player-container { display: none; width: 100vw; height: 100vh; background: #000; position: relative; }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* UI OVERLAY */
        .ui-overlay {
            position: absolute; inset: 0; z-index: 10;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 40%);
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 15px 20px; transition: opacity 0.4s;
        }
        .ui-hidden { opacity: 0; cursor: none; }

        /* PROGRESS BAR */
        .progress-wrap { width: 100%; height: 5px; background: rgba(255,255,255,0.2); border-radius: 10px; cursor: pointer; margin-bottom: 12px; }
        .progress-fill { height: 100%; width: 0%; background: var(--primary); border-radius: 10px; box-shadow: 0 0 12px var(--primary); transition: width 0.1s linear; }

        /* BOTTOM BAR */
        .bottom-bar { display: flex; align-items: center; justify-content: space-between; }
        .group { display: flex; align-items: center; gap: 20px; }
        .icon-btn { background: none; border: none; color: #fff; font-size: 1.3rem; cursor: pointer; transition: 0.2s; }
        .icon-btn:hover { color: var(--primary); transform: scale(1.1); }
        .time-info { font-size: 0.85rem; opacity: 0.9; min-width: 100px; }

        /* --- SETTINGS MENU --- */
        .settings-menu {
            position: absolute; bottom: 80px; right: 20px;
            background: #111827; border: 1px solid var(--primary);
            border-radius: 16px; width: 240px; display: none;
            flex-direction: column; overflow: hidden; z-index: 100;
            box-shadow: 0 15px 40px rgba(0,0,0,0.7);
        }
        .settings-menu.active { display: flex; animation: slideIn 0.2s ease-out; }
        .m-head { padding: 12px 15px; background: var(--primary); color: #fff; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        
        .m-item {
            padding: 14px 18px; display: flex; justify-content: space-between; align-items: center;
            font-size: 0.9rem; color: #fff; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05);
            background: #111827; transition: 0.2s;
        }
        .m-item:hover { background: #1f2937; }
        .m-item span { color: var(--primary); font-weight: 600; font-size: 0.85rem; }
        .m-item i { width: 20px; text-align: center; font-size: 0.9rem; }

        /* DOUBLE TAP RIPPLES */
        .ripple {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 90px; height: 90px; background: rgba(99, 102, 241, 0.3);
            border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: 0.4s; z-index: 5;
        }
        .rip-l { left: 15%; } .rip-r { right: 15%; }
        .ripple.active { opacity: 1; transform: translateY(-50%) scale(1.3); }
        .ripple span { font-size: 0.7rem; font-weight: 900; margin-top: 5px; }

        #speed-hint {
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
            background: var(--primary); padding: 6px 18px; border-radius: 30px;
            font-size: 0.8rem; font-weight: bold; display: none; z-index: 100; box-shadow: 0 0 15px var(--primary);
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* PORTRAIT ADJUSTMENT */
        @media (max-width: 600px) {
            .settings-menu { right: 10px; bottom: 75px; width: 220px; }
            .time-info { font-size: 0.75rem; min-width: 80px; }
        }
    </style>
</head>
<body>

    <!-- GENERATOR SECTION -->
    <div id="gen-ui">
        <div class="gen-card">
            <h2 style="color:var(--primary)">Indigo Pro Engine</h2>
            <input type="text" id="urlInput" placeholder="Paste Direct Anime Link (.mp4, .m3u8)">
            <button class="btn-gen" onclick="generate()">Generate Link & Code</button>
            <div id="outputCode" style="margin-top:20px; display:none; background:#000; padding:15px; border-radius:8px; font-size:0.7rem; word-break:break-all; border:1px dashed var(--primary); color:#cbd5e1;"></div>
        </div>
    </div>

    <!-- PLAYER SECTION -->
    <div id="player-container">
        <video id="mainVid" playsinline crossorigin="anonymous">
            <source src="" type="video/mp4">
        </video>

        <!-- Feedback UI -->
        <div class="ripple rip-l" id="ripL"><i class="fas fa-backward"></i><span>10S</span></div>
        <div class="ripple rip-r" id="ripR"><i class="fas fa-forward"></i><span>10S</span></div>
        <div id="speed-hint">2X FAST FORWARD</div>

        <div class="ui-overlay" id="ui">
            <div class="progress-wrap" id="pWrap">
                <div class="progress-fill" id="pFill"></div>
            </div>

            <div class="bottom-bar">
                <div class="group">
                    <button class="icon-btn" id="playToggle"><i class="fas fa-play"></i></button>
                    <div class="time-info"><span id="currT">00:00</span> / <span id="durT">00:00</span></div>
                </div>
                <div class="group">
                    <button class="icon-btn" onclick="toggleMenu()"><i class="fas fa-sliders-h"></i></button>
                    <button class="icon-btn" onclick="toggleFS()"><i class="fas fa-expand"></i></button>
                </div>
            </div>
        </div>

        <!-- NEW SETTINGS MENU (Includes Skips) -->
        <div class="settings-menu" id="setMenu">
            <div class="m-head">Player Settings</div>
            
            <div class="m-item" onclick="seekManual(-10)">Rewind 10s <i class="fas fa-undo"></i></div>
            <div class="m-item" onclick="seekManual(10)">Forward 10s <i class="fas fa-redo"></i></div>
            
            <div class="m-item" onclick="changeSpeed()">Playback Speed <span id="spText">1.0x</span></div>
            
            <div id="audioGroup">
                <div class="m-item">Default Audio <i class="fas fa-check" style="color:var(--primary)"></i></div>
            </div>
            
            <div class="m-item" onclick="takeSnapshot()">Capture Frame <i class="fas fa-camera"></i></div>
        </div>
    </div>

    <script>
        const vid = document.getElementById('mainVid');
        const playBtn = document.getElementById('playToggle');
        const ui = document.getElementById('ui');
        const pFill = document.getElementById('pFill');

        // 1. EMBED GENERATOR
        function generate() {
            const input = document.getElementById('urlInput').value;
            if(!input) return alert("Paste a link first!");
            const playerUrl = window.location.href.split('?')[0] + "?v=" + encodeURIComponent(input);
            const iframe = `<iframe src="${playerUrl}" width="100%" height="450px" frameborder="0" allowfullscreen></iframe>`;
            document.getElementById('outputCode').innerText = iframe;
            document.getElementById('outputCode').style.display = 'block';
        }

        // 2. PLAYER INIT
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const vUrl = params.get('v');
            if(vUrl) {
                document.getElementById('gen-ui').style.display = 'none';
                document.getElementById('player-container').style.display = 'block';
                vid.src = vUrl;
                vid.load();
                setupAudio();
            }
        };

        // 3. GESTURES (Double Tap & Long Press)
        let lastTap = 0;
        let pTimer;

        vid.addEventListener('touchstart', (e) => {
            const now = Date.now();
            const x = e.touches[0].clientX;
            const w = window.innerWidth;
            
            if(now - lastTap < 300) {
                if(x < w/2) seekManual(-10, 'ripL'); else seekManual(10, 'ripR');
                e.preventDefault();
            }
            lastTap = now;

            pTimer = setTimeout(() => {
                vid.playbackRate = 2;
                document.getElementById('speed-hint').style.display = 'block';
            }, 500);
        });

        vid.addEventListener('touchend', () => {
            clearTimeout(pTimer);
            vid.playbackRate = 1;
            document.getElementById('speed-hint').style.display = 'none';
        });

        function seekManual(sec, rippleId) {
            vid.currentTime += sec;
            if(rippleId) {
                const r = document.getElementById(rippleId);
                r.classList.add('active');
                setTimeout(() => r.classList.remove('active'), 500);
            }
        }

        // 4. CORE CONTROLS
        playBtn.onclick = togglePlay;
        function togglePlay() {
            if(vid.paused) { vid.play(); playBtn.innerHTML='<i class="fas fa-pause"></i>'; }
            else { vid.pause(); playBtn.innerHTML='<i class="fas fa-play"></i>'; }
        }

        vid.ontimeupdate = () => {
            pFill.style.width = (vid.currentTime / vid.duration * 100) + '%';
            document.getElementById('currT').innerText = fmt(vid.currentTime);
            document.getElementById('durT').innerText = fmt(vid.duration);
        };

        function fmt(s) {
            if(isNaN(s)) return "00:00";
            let m=Math.floor(s/60), sec=Math.floor(s%60);
            return (m<10?'0'+m:m)+":"+(sec<10?'0'+sec:sec);
        }

        document.getElementById('pWrap').onclick = (e) => vid.currentTime = (e.offsetX / document.getElementById('pWrap').offsetWidth) * vid.duration;

        // 5. SETTINGS FUNCTIONS
        function toggleMenu() { document.getElementById('setMenu').classList.toggle('active'); }
        
        function changeSpeed() {
            vid.playbackRate = vid.playbackRate >= 2 ? 0.5 : vid.playbackRate + 0.5;
            document.getElementById('spText').innerText = vid.playbackRate + 'x';
        }

        async function toggleFS() {
            if(!document.fullscreenElement) {
                await document.getElementById('player-container').requestFullscreen();
                if(screen.orientation.lock) screen.orientation.lock('landscape').catch(()=>{});
            } else document.exitFullscreen();
        }

        function setupAudio() {
            const container = document.getElementById('audioGroup');
            if(vid.audioTracks && vid.audioTracks.length > 1) {
                container.innerHTML = "";
                for(let i=0; i<vid.audioTracks.length; i++) {
                    const el = document.createElement('div');
                    el.className = "m-item";
                    el.innerHTML = `Audio track ${i+1} <span>${vid.audioTracks[i].language}</span>`;
                    el.onclick = () => {
                        for(let j=0; j<vid.audioTracks.length; j++) vid.audioTracks[j].enabled = (i===j);
                        alert("Track Switched");
                    };
                    container.appendChild(el);
                }
            }
        }

        function takeSnapshot() {
            const c = document.createElement('canvas');
            c.width = vid.videoWidth; c.height = vid.videoHeight;
            c.getContext('2d').drawImage(vid, 0, 0);
            const a = document.createElement('a'); a.download = 'anime_snap.png'; a.href = c.toDataURL(); a.click();
        }

        // UI AUTO-HIDE
        let hideT;
        function showUI() {
            ui.classList.remove('ui-hidden');
            clearTimeout(hideT);
            if(!vid.paused) hideT = setTimeout(() => ui.classList.add('ui-hidden'), 3000);
        }
        document.getElementById('player-container').onmousemove = showUI;
        document.getElementById('player-container').ontouchstart = showUI;
        vid.onclick = () => { document.getElementById('setMenu').classList.remove('active'); togglePlay(); };
    </script>
</body>
</html>
