<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indigo Pro Player | Anime Stream</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.5);
            --bg: #0b0e14;
            --surface: #161b22;
            --text: #e2e8f0;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            overflow: hidden; /* Clean embed look */
        }

        /* --- Input Link Creator (Hidden when 'v' param is present) --- */
        #setup-ui {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
            text-align: center;
        }

        .creator-card {
            background: var(--surface);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--primary);
            box-shadow: 0 0 30px var(--primary-glow);
            max-width: 500px; width: 100%;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            background: #000;
            border: 1px solid #333;
            color: white;
            border-radius: 8px;
        }

        /* --- Professional Player UI --- */
        #player-container {
            display: none; /* Hidden by default */
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #000;
            group-hover: cursor-none;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Overlay UI */
        .controls-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 20%, transparent 80%, rgba(0,0,0,0.7) 100%);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 10;
        }

        #player-container:hover .controls-overlay { opacity: 1; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; }
        .anime-title { font-weight: 600; font-size: 1.1rem; color: var(--primary); text-shadow: 0 0 10px var(--primary-glow); }

        /* Custom Progress Bar */
        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 15px;
            position: relative;
        }
        .progress-filled {
            height: 100%;
            background: var(--primary);
            width: 0%;
            border-radius: 10px;
            box-shadow: 0 0 10px var(--primary);
        }

        .bottom-controls { display: flex; align-items: center; justify-content: space-between; }
        .flex-group { display: flex; align-items: center; gap: 20px; }

        .icon-btn {
            background: none; border: none; color: white;
            font-size: 1.2rem; cursor: pointer; transition: 0.2s;
        }
        .icon-btn:hover { color: var(--primary); transform: scale(1.1); }

        /* New Settings Panel */
        .settings-panel {
            position: absolute;
            bottom: 80px;
            right: 20px;
            background: rgba(22, 27, 34, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--primary);
            display: none;
            flex-direction: column;
            gap: 10px;
            min-width: 150px;
        }
        .settings-panel.active { display: flex; }
        .setting-item { display: flex; justify-content: space-between; font-size: 0.9rem; cursor: pointer; }
        .setting-item:hover { color: var(--primary); }

        /* Skip Button */
        .skip-btn {
            position: absolute;
            bottom: 100px;
            right: 0;
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            border-radius: 5px 0 0 5px;
            cursor: pointer;
            font-weight: 600;
            display: none;
            animation: slideIn 0.5s;
        }

        /* Custom Context Menu */
        #custom-menu {
            position: fixed;
            background: var(--surface);
            border: 1px solid var(--primary);
            padding: 10px 0;
            border-radius: 8px;
            display: none;
            z-index: 1000;
            min-width: 180px;
        }
        .menu-item {
            padding: 8px 20px;
            cursor: pointer;
            font-size: 14px;
        }
        .menu-item:hover { background: var(--primary); }

        @keyframes slideIn { from { right: -100px; } to { right: 0; } }
    </style>
</head>
<body>

    <!-- UI FOR CREATING LINK (Visible only if no ?v= link) -->
    <div id="setup-ui">
        <div class="creator-card">
            <h1 style="color:var(--primary)">Indigo Anime Linker</h1>
            <p>Paste your direct video URL below</p>
            <input type="text" id="videoInput" placeholder="https://example.com/video.mp4">
            <button onclick="generateFromInput()" style="background:var(--primary); color:white; border:none; padding:12px 30px; border-radius:8px; cursor:pointer; font-weight:600;">Generate Direct Player</button>
        </div>
    </div>

    <!-- MAIN PLAYER (Visible when video is loaded) -->
    <div id="player-container">
        <video id="mainVideo" playsinline>
            <source src="" type="video/mp4">
        </video>

        <div class="skip-btn" id="skipIntro" onclick="skipTime(90)">Skip Intro +1:30</div>

        <div class="controls-overlay">
            <div class="top-bar">
                <div class="anime-title"><i class="fas fa-bolt"></i> Indigo Stream - Online</div>
                <div class="flex-group">
                    <button class="icon-btn" onclick="togglePip()"><i class="fas fa-external-link-alt"></i></button>
                </div>
            </div>

            <div class="center-ui">
                <!-- Can add a big play/pause icon here -->
            </div>

            <div class="bottom-bar">
                <div class="progress-container" id="progressWrap">
                    <div class="progress-filled" id="progressFill"></div>
                </div>

                <div class="bottom-controls">
                    <div class="flex-group">
                        <button class="icon-btn" id="playBtn"><i class="fas fa-play"></i></button>
                        <button class="icon-btn" onclick="skipTime(-10)"><i class="fas fa-undo"></i></button>
                        <button class="icon-btn" onclick="skipTime(10)"><i class="fas fa-redo"></i></button>
                        <span id="timeDisplay" style="font-size: 0.9rem;">00:00 / 00:00</span>
                    </div>

                    <div class="flex-group">
                        <div class="volume-box" style="display:flex; align-items:center; gap:10px;">
                            <i class="fas fa-volume-up"></i>
                            <input type="range" id="volumeSlider" min="0" max="1" step="0.1" style="width:60px; margin:0;">
                        </div>
                        <button class="icon-btn" onclick="toggleSettings()"><i class="fas fa-cog"></i></button>
                        <button class="icon-btn" id="fullScreenBtn"><i class="fas fa-expand"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Settings Panel -->
        <div class="settings-panel" id="settingsPanel">
            <div class="setting-item"><b>Quality</b> <span>Auto (1080p)</span></div>
            <div class="setting-item" onclick="changeSpeed(1.5)"><b>Speed</b> <span id="currentSpeed">Normal</span></div>
            <div class="setting-item" onclick="location.reload()"><b>Refresh Player</b></div>
        </div>
    </div>

    <!-- Right Click Menu -->
    <div id="custom-menu">
        <div class="menu-item" onclick="takeScreenshot()">Take Screenshot</div>
        <div class="menu-item" onclick="window.open(location.href)">Open in New Tab</div>
        <div class="menu-item" style="border-top:1px solid #333">Indigo Player v2.0</div>
    </div>

    <script>
        const video = document.getElementById('mainVideo');
        const setupUI = document.getElementById('setup-ui');
        const playerUI = document.getElementById('player-container');
        const progressFill = document.getElementById('progressFill');
        const progressWrap = document.getElementById('progressWrap');
        const playBtn = document.getElementById('playBtn');

        // Check for URL Parameter "?v="
        function initPlayer() {
            const params = new URLSearchParams(window.location.search);
            const videoUrl = params.get('v');

            if (videoUrl) {
                setupUI.style.display = 'none';
                playerUI.style.display = 'block';
                video.src = videoUrl;
                video.play().catch(() => console.log("Autoplay blocked, waiting for user interaction."));
            }
        }

        function generateFromInput() {
            const val = document.getElementById('videoInput').value;
            if(val) window.location.href = window.location.pathname + '?v=' + encodeURIComponent(val);
        }

        // Play/Pause
        playBtn.addEventListener('click', togglePlay);
        video.addEventListener('click', togglePlay);

        function togglePlay() {
            if (video.paused) {
                video.play();
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
            } else {
                video.pause();
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
            }
        }

        // Progress Bar
        video.addEventListener('timeupdate', () => {
            const pct = (video.currentTime / video.duration) * 100;
            progressFill.style.width = pct + '%';
            
            // Time Display
            document.getElementById('timeDisplay').innerText = 
                formatTime(video.currentTime) + ' / ' + formatTime(video.duration);

            // Skip Intro Button Logic (shows between 5s and 90s)
            document.getElementById('skipIntro').style.display = (video.currentTime > 5 && video.currentTime < 95) ? 'block' : 'none';
        });

        function formatTime(time) {
            let m = Math.floor(time / 60);
            let s = Math.floor(time % 60);
            return (m < 10 ? '0'+m : m) + ':' + (s < 10 ? '0'+s : s);
        }

        progressWrap.addEventListener('click', (e) => {
            const scrubTime = (e.offsetX / progressWrap.offsetWidth) * video.duration;
            video.currentTime = scrubTime;
        });

        function skipTime(time) { video.currentTime += time; }

        function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('active'); }

        function changeSpeed(s) {
            video.playbackRate = video.playbackRate === 1 ? 1.5 : 1;
            document.getElementById('currentSpeed').innerText = video.playbackRate + 'x';
        }

        function togglePip() {
            if (document.pictureInPictureElement) document.exitPictureInPicture();
            else video.requestPictureInPicture();
        }

        document.getElementById('fullScreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) playerUI.requestFullscreen();
            else document.exitFullscreen();
        });

        // Volume
        document.getElementById('volumeSlider').addEventListener('input', (e) => {
            video.volume = e.target.value;
        });

        // Custom Context Menu
        window.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            const menu = document.getElementById('custom-menu');
            menu.style.display = 'block';
            menu.style.left = e.pageX + 'px';
            menu.style.top = e.pageY + 'px';
        });

        window.addEventListener('click', () => {
            document.getElementById('custom-menu').style.display = 'none';
        });

        function takeScreenshot() {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const link = document.createElement('a');
            link.download = 'anime_capture.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        initPlayer();
    </script>
</body>
</html>
