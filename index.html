<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indigo Player V7</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0b0e14;
            --ui-bg: rgba(15, 23, 42, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; background: #000; color: #fff; overflow: hidden; }

        /* --- GENERATOR SECTION --- */
        #gen-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; background: var(--bg); padding: 20px;
        }
        .card {
            background: #161b22; padding: 30px; border-radius: 20px; border: 1px solid var(--primary);
            width: 100%; max-width: 500px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        input {
            width: 100%; padding: 15px; background: #000; border: 1px solid #333;
            color: white; border-radius: 10px; margin: 20px 0; outline: none;
        }
        .gen-btn {
            background: var(--primary); color: white; border: none; padding: 15px 30px;
            border-radius: 10px; font-weight: 600; cursor: pointer; width: 100%; transition: 0.3s;
        }
        .result-box {
            margin-top: 20px; display: none; text-align: left;
            background: #000; padding: 15px; border-radius: 10px; border: 1px dashed var(--primary);
        }
        .link-text { font-size: 0.75rem; word-break: break-all; color: var(--primary); font-family: monospace; }

        /* --- PLAYER SECTION --- */
        #player-box { display: none; width: 100vw; height: 100vh; background: #000; position: relative; }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* Initial Big Play Button (Fixes "Video Not Playing") */
        #start-overlay {
            position: absolute; inset: 0; z-index: 50; background: rgba(0,0,0,0.6);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .play-ring {
            width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--primary);
            display: flex; align-items: center; justify-content: center; font-size: 2rem;
            color: var(--primary); box-shadow: 0 0 20px var(--primary);
        }

        /* UI CONTROLS */
        .overlay {
            position: absolute; inset: 0; z-index: 10;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 40%);
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 15px 20px; transition: opacity 0.4s;
        }
        .ui-hide { opacity: 0; cursor: none; }

        .p-bar { width: 100%; height: 5px; background: rgba(255,255,255,0.2); border-radius: 10px; cursor: pointer; margin-bottom: 15px; }
        .p-fill { height: 100%; width: 0%; background: var(--primary); border-radius: 10px; box-shadow: 0 0 10px var(--primary); }

        .control-bar { display: flex; align-items: center; justify-content: space-between; }
        .group { display: flex; align-items: center; gap: 18px; }
        .btn { background: none; border: none; color: white; font-size: 1.2rem; cursor: pointer; transition: 0.2s; }
        .btn:hover { color: var(--primary); }
        .time { font-size: 0.85rem; min-width: 90px; }

        /* RIPPLES & HINTS */
        .ripple {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 100px; height: 100px; background: rgba(99, 102, 241, 0.2);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: 0.4s; z-index: 5; font-size: 1.5rem;
        }
        .r-left { left: 15%; } .r-right { right: 15%; }
        .ripple.active { opacity: 1; transform: translateY(-50%) scale(1.3); }

        #speed-hint {
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
            background: var(--primary); padding: 5px 15px; border-radius: 20px;
            font-size: 0.8rem; font-weight: bold; display: none; z-index: 100;
        }

        /* FLOAT MENUS */
        .float-menu {
            position: absolute; bottom: 80px; background: var(--ui-bg);
            border: 1px solid var(--primary); border-radius: 12px; width: 200px;
            display: none; flex-direction: column; overflow: hidden; z-index: 100;
        }
        .float-menu.active { display: flex; animation: slideUp 0.2s; }
        .menu-item { padding: 12px 15px; font-size: 0.9rem; cursor: pointer; display: flex; justify-content: space-between; border-bottom: 1px solid #222; }
        .menu-item:hover { background: var(--primary); }

        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <!-- SECTION: LINK CREATOR -->
    <div id="gen-screen">
        <div class="card">
            <h2 style="color:var(--primary)">Indigo Anime Linker</h2>
            <input type="text" id="rawUrl" placeholder="Paste Direct Video Link (.mp4)">
            <button class="gen-btn" onclick="generateLink()">Generate Player Link</button>
            <div class="result-box" id="resBox">
                <p style="font-size: 0.7rem; margin-bottom: 5px; opacity: 0.6;">SHAREABLE PLAYER LINK:</p>
                <div class="link-text" id="finalLink"></div>
                <button class="gen-btn" style="margin-top:10px; padding:8px;" onclick="copyLink()">Copy Link</button>
            </div>
        </div>
    </div>

    <!-- SECTION: THE PLAYER -->
    <div id="player-box">
        <!-- Start Overlay to fix blocked video -->
        <div id="start-overlay" onclick="firstStart()">
            <div class="play-ring"><i class="fas fa-play"></i></div>
        </div>

        <video id="mainVid" playsinline crossorigin="anonymous">
            <source src="" type="video/mp4">
        </video>

        <!-- Gestures -->
        <div class="ripple r-left" id="ripL"><i class="fas fa-backward"></i></div>
        <div class="ripple r-right" id="ripR"><i class="fas fa-forward"></i></div>
        <div id="speed-hint">2X SPEED</div>

        <!-- Controls -->
        <div class="overlay" id="ui">
            <div class="p-bar" id="pBase"><div class="p-fill" id="pFill"></div></div>
            <div class="control-bar">
                <div class="group">
                    <button class="btn" id="playBtn"><i class="fas fa-play"></i></button>
                    <div class="time"><span id="cur">00:00</span> / <span id="dur">00:00</span></div>
                </div>
                <div class="group">
                    <!-- DEDICATED SUB & VOICE BUTTONS -->
                    <button class="btn" onclick="toggleM('subM')" title="Subtitles"><i class="fas fa-closed-captioning"></i></button>
                    <button class="btn" onclick="toggleM('audM')" title="Voice/Audio"><i class="fas fa-microphone"></i></button>
                    <button class="btn" onclick="toggleM('setM')" title="Settings"><i class="fas fa-cog"></i></button>
                    <button class="btn" onclick="handleFS()"><i class="fas fa-expand"></i></button>
                </div>
            </div>
        </div>

        <!-- Float Menus -->
        <div class="float-menu" id="subM" style="right: 120px;">
            <div class="menu-item" onclick="alert('Subtitles Enabled')">English (Internal)</div>
            <div class="menu-item" onclick="alert('Subs Disabled')">None</div>
        </div>
        <div class="float-menu" id="audM" style="right: 80px;">
            <div id="audList"><div class="menu-item">Japanese (Default)</div></div>
        </div>
        <div class="float-menu" id="setM" style="right: 20px;">
            <div class="menu-item" onclick="changeSpeed()">Speed <span id="sVal">1.0x</span></div>
            <div class="menu-item" onclick="snap()">Capture <i class="fas fa-camera"></i></div>
        </div>
    </div>

    <script>
        const video = document.getElementById('mainVid');
        const playBtn = document.getElementById('playBtn');
        const pFill = document.getElementById('pFill');
        const ui = document.getElementById('ui');

        // 1. LINK GENERATOR
        function generateLink() {
            const val = document.getElementById('rawUrl').value;
            if(!val) return alert("Enter a link!");
            const encoded = encodeURIComponent(val);
            const final = window.location.origin + window.location.pathname + "?v=" + encoded;
            document.getElementById('finalLink').innerText = final;
            document.getElementById('resBox').style.display = 'block';
        }

        function copyLink() {
            navigator.clipboard.writeText(document.getElementById('finalLink').innerText);
            alert("Link Copied!");
        }

        // 2. PLAYER INITIALIZATION
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const vUrl = params.get('v');
            if(vUrl) {
                document.getElementById('gen-screen').style.display = 'none';
                document.getElementById('player-box').style.display = 'block';
                video.src = decodeURIComponent(vUrl);
                video.load();
            }
        };

        // Fix video playback (First click starts video)
        function firstStart() {
            document.getElementById('start-overlay').style.display = 'none';
            video.play();
            playBtn.innerHTML = '<i class="fas fa-pause"></i>';
            setupAudio();
        }

        // 3. GESTURES (Double Tap / Long Press)
        let lastTap = 0;
        let pressT;

        video.addEventListener('touchstart', (e) => {
            const now = Date.now();
            const x = e.touches[0].clientX;
            const w = window.innerWidth;
            if(now - lastTap < 300) {
                if(x < w/2) skip(-10, 'ripL'); else skip(10, 'ripR');
                e.preventDefault();
            }
            lastTap = now;

            pressT = setTimeout(() => {
                video.playbackRate = 2;
                document.getElementById('speed-hint').style.display = 'block';
            }, 500);
        });

        video.addEventListener('touchend', () => {
            clearTimeout(pressT);
            video.playbackRate = 1;
            document.getElementById('speed-hint').style.display = 'none';
        });

        function skip(s, id) {
            video.currentTime += s;
            const r = document.getElementById(id);
            r.classList.add('active');
            setTimeout(() => r.classList.remove('active'), 400);
        }

        // 4. CORE CONTROLS
        playBtn.onclick = togglePlay;
        function togglePlay() {
            if(video.paused) { video.play(); playBtn.innerHTML='<i class="fas fa-pause"></i>'; }
            else { video.pause(); playBtn.innerHTML='<i class="fas fa-play"></i>'; }
        }

        video.ontimeupdate = () => {
            pFill.style.width = (video.currentTime / video.duration * 100) + '%';
            document.getElementById('cur').innerText = fmt(video.currentTime);
            document.getElementById('dur').innerText = fmt(video.duration);
        };

        function fmt(s) {
            if(isNaN(s)) return "00:00";
            let m=Math.floor(s/60), sec=Math.floor(s%60);
            return (m<10?'0'+m:m)+":"+(sec<10?'0'+sec:sec);
        }

        document.getElementById('pBase').onclick = (e) => video.currentTime = (e.offsetX / document.getElementById('pBase').offsetWidth) * video.duration;

        // 5. MENUS
        function toggleM(id) {
            document.querySelectorAll('.float-menu').forEach(m => { if(m.id !== id) m.classList.remove('active'); });
            document.getElementById(id).classList.toggle('active');
        }

        function changeSpeed() {
            video.playbackRate = video.playbackRate >= 2 ? 0.5 : video.playbackRate + 0.5;
            document.getElementById('sVal').innerText = video.playbackRate + 'x';
        }

        async function handleFS() {
            if(!document.fullscreenElement) {
                await document.getElementById('player-box').requestFullscreen();
                if(screen.orientation.lock) screen.orientation.lock('landscape').catch(()=>{});
            } else document.exitFullscreen();
        }

        function setupAudio() {
            const box = document.getElementById('audList');
            if(video.audioTracks && video.audioTracks.length > 1) {
                box.innerHTML = "";
                for(let i=0; i<video.audioTracks.length; i++) {
                    const el = document.createElement('div');
                    el.className = "menu-item";
                    el.innerText = `Track ${i+1} (${video.audioTracks[i].language})`;
                    el.onclick = () => { for(let j=0; j<video.audioTracks.length; j++) video.audioTracks[j].enabled = (i===j); };
                    box.appendChild(el);
                }
            }
        }

        function snap() {
            const c = document.createElement('canvas');
            c.width = video.videoWidth; c.height = video.videoHeight;
            c.getContext('2d').drawImage(video, 0, 0);
            const a = document.createElement('a'); a.download = 'capture.png'; a.href = c.toDataURL(); a.click();
        }

        // AUTO-HIDE UI
        let timer;
        function showUI() {
            ui.classList.remove('ui-hide');
            clearTimeout(timer);
            if(!video.paused) timer = setTimeout(() => ui.classList.add('ui-hide'), 3000);
        }
        document.getElementById('player-box').onmousemove = showUI;
        document.getElementById('player-box').ontouchstart = showUI;
        video.onclick = () => { document.querySelectorAll('.float-menu').forEach(m => m.classList.remove('active')); showUI(); };
    </script>
</body>
</html>
