<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <!-- Icons & Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --indigo: #6366f1;
            --indigo-dark: #4f46e5;
            --bg-overlay: rgba(15, 23, 42, 0.9);
            --glass: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body, html { 
            width: 100%; height: 100%; 
            background: #000; 
            overflow: hidden; 
        }

        /* --- Player Container --- */
        #player {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            max-height: 100vh;
            outline: none;
        }

        /* --- Controls Styling --- */
        .controls {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 15px 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 10;
        }

        #player:hover .controls, #player:active .controls { opacity: 1; }

        /* Progress Bar */
        .progress-area {
            width: 100%;
            height: 5px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 15px;
            position: relative;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--indigo);
            border-radius: 10px;
            box-shadow: 0 0 10px var(--indigo);
            position: relative;
        }

        /* Control Buttons */
        .control-grid {
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #fff;
        }

        .btn-group { display: flex; align-items: center; gap: 15px; }

        .icon {
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.2s;
            color: #fff;
            background: none; border: none;
        }
        .icon:hover { color: var(--indigo); transform: scale(1.1); }

        .time { font-size: 0.85rem; font-weight: 500; min-width: 80px; }

        /* --- Settings Panel --- */
        .menu {
            position: absolute;
            bottom: 70px;
            right: 20px;
            background: var(--bg-overlay);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass);
            border-radius: 12px;
            width: 200px;
            display: none;
            flex-direction: column;
            overflow: hidden;
            z-index: 20;
        }
        .menu.active { display: flex; animation: fadeIn 0.2s; }

        .menu-item {
            padding: 12px 15px;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass);
        }
        .menu-item:hover { background: var(--indigo); }

        /* --- Anime Features --- */
        .skip-btn {
            position: absolute;
            bottom: 80px;
            right: 20px;
            background: var(--indigo);
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: none;
            border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* Automatic Subtitle Styling */
        ::cue {
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            font-size: 1rem;
        }

        /* --- Setup UI (Only shown if no link) --- */
        #setup-screen {
            position: fixed;
            inset: 0;
            background: #0f172a;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .setup-box {
            background: #1e293b;
            padding: 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid var(--indigo);
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            background: #000;
            border: 1px solid #333;
            color: white;
            border-radius: 8px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .time { display: none; }
            .icon { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <!-- LINK CREATOR SCREEN -->
    <div id="setup-screen">
        <div class="setup-box">
            <h2 style="color: var(--indigo)">Anime Player</h2>
            <input type="text" id="vUrl" placeholder="Paste Direct Video Link (.mp4)">
            <button onclick="loadLink()" style="background:var(--indigo); color:white; border:none; padding:12px 25px; border-radius:8px; width:100%; cursor:pointer; font-weight:600;">Play Video</button>
        </div>
    </div>

    <!-- MAIN VIDEO PLAYER -->
    <div id="player" style="display: none;">
        <video id="mainVideo" playsinline>
            <source src="" type="video/mp4">
            <!-- Placeholders for automatic sub logic -->
            <track id="subTrack" kind="subtitles" srclang="en" label="English Auto" default>
        </video>

        <!-- Skip Intro -->
        <button class="skip-btn" id="skipIntro" onclick="seek(90)">Skip Intro +1:30</button>

        <!-- Player Controls -->
        <div class="controls">
            <div class="progress-area" id="pArea">
                <div class="progress-bar" id="pBar"></div>
            </div>

            <div class="control-grid">
                <div class="btn-group">
                    <button class="icon" id="playPause"><i class="fas fa-play"></i></button>
                    <button class="icon" onclick="seek(-10)"><i class="fas fa-undo"></i></button>
                    <button class="icon" onclick="seek(10)"><i class="fas fa-redo"></i></button>
                    <div class="time"><span id="curTime">00:00</span> / <span id="durTime">00:00</span></div>
                </div>

                <div class="btn-group">
                    <button class="icon" onclick="toggleMenu()"><i class="fas fa-closed-captioning"></i></button>
                    <button class="icon" onclick="toggleMenu()"><i class="fas fa-cog"></i></button>
                    <button class="icon" id="fsBtn"><i class="fas fa-expand"></i></button>
                </div>
            </div>
        </div>

        <!-- Settings Menu -->
        <div class="menu" id="settingsMenu">
            <div class="menu-item" onclick="toggleSubs()"><b>Subtitles</b> <span id="subStatus">ON</span></div>
            <div class="menu-item" onclick="changeAudio()"><b>Audio/Voice</b> <span>Japanese</span></div>
            <div class="menu-item" onclick="changeSpeed()"><b>Speed</b> <span id="speedTxt">1.0x</span></div>
            <div class="menu-item" onclick="takeCapture()"><b>Screenshot</b> <i class="fas fa-camera"></i></div>
        </div>
    </div>

    <script>
        const video = document.getElementById('mainVideo');
        const setup = document.getElementById('setup-screen');
        const player = document.getElementById('player');
        const pBar = document.getElementById('pBar');
        const pArea = document.getElementById('pArea');
        const playBtn = document.getElementById('playPause');

        // 1. Initialize Player based on URL
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const videoLink = params.get('v');
            if(videoLink) {
                startPlayer(videoLink);
            }
        };

        function loadLink() {
            const url = document.getElementById('vUrl').value;
            if(url) startPlayer(url);
        }

        function startPlayer(url) {
            setup.style.display = 'none';
            player.style.display = 'flex';
            video.src = url;
            video.play();
            playBtn.innerHTML = '<i class="fas fa-pause"></i>';
        }

        // 2. Play/Pause Logic
        playBtn.onclick = () => {
            if(video.paused) { video.play(); playBtn.innerHTML = '<i class="fas fa-pause"></i>'; }
            else { video.pause(); playBtn.innerHTML = '<i class="fas fa-play"></i>'; }
        };

        // 3. Progress & Time
        video.ontimeupdate = () => {
            const pct = (video.currentTime / video.duration) * 100;
            pBar.style.width = pct + '%';
            document.getElementById('curTime').innerText = format(video.currentTime);
            document.getElementById('durTime').innerText = format(video.duration);
            
            // Auto-show skip intro button
            document.getElementById('skipIntro').style.display = (video.currentTime > 2 && video.currentTime < 90) ? 'block' : 'none';
        };

        pArea.onclick = (e) => {
            video.currentTime = (e.offsetX / pArea.offsetWidth) * video.duration;
        };

        function format(t) {
            let m = Math.floor(t / 60);
            let s = Math.floor(t % 60);
            return (m<10?'0'+m:m) + ":" + (s<10?'0'+s:s);
        }

        function seek(s) { video.currentTime += s; }

        // 4. Advanced Settings Logic
        function toggleMenu() { document.getElementById('settingsMenu').classList.toggle('active'); }

        function toggleSubs() {
            const track = video.textTracks[0];
            if (track.mode === 'showing') {
                track.mode = 'disabled';
                document.getElementById('subStatus').innerText = 'OFF';
            } else {
                track.mode = 'showing';
                document.getElementById('subStatus').innerText = 'ON';
            }
        }

        function changeSpeed() {
            video.playbackRate = video.playbackRate >= 2 ? 1 : video.playbackRate + 0.5;
            document.getElementById('speedTxt').innerText = video.playbackRate + 'x';
        }

        function takeCapture() {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const a = document.createElement('a');
            a.download = 'anime_ss.png';
            a.href = canvas.toDataURL();
            a.click();
        }

        // 5. Dub/Audio Support
        // Note: Multi-audio switching requires HLS.js. For standard MP4, this is a UI placeholder.
        function changeAudio() {
            alert("Switching to English Dub...");
            // Logic for switching tracks would go here if using .m3u8 files
        }

        // 6. Fullscreen Fix
        document.getElementById('fsBtn').onclick = () => {
            if (player.requestFullscreen) player.requestFullscreen();
            else if (player.webkitRequestFullscreen) player.webkitRequestFullscreen();
        };

        // Close menu on video click
        video.onclick = () => {
            document.getElementById('settingsMenu').classList.remove('active');
        }
    </script>
</body>
</html>
